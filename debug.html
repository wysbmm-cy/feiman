<!DOCTYPE html>
<html>
<head>
    <title>Debug Helper</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
        .log { margin: 5px 0; padding: 10px; background: #2a2a2a; border-radius: 5px; }
        .error { color: #f44; }
        .success { color: #4f4; }
    </style>
</head>
<body>
    <h2>🔍 Debug Helper for 费曼学习助手</h2>
    <div id="output"></div>
    
    <script>
        const output = document.getElementById('output');
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'log ' + type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            output.appendChild(div);
        }
        
        // Check if we can access the main app
        log('Checking window.electronAPI...', 'info');
        
        if (window.electronAPI) {
            log('✅ electronAPI found!', 'success');
        } else {
            log('❌ electronAPI not found - running in browser mode', 'error');
        }
        
        // Check localStorage
        log('Checking localStorage...', 'info');
        try {
            const keys = Object.keys(localStorage);
            log(`Found ${keys.length} keys: ${keys.join(', ')}`, 'success');
        } catch (e) {
            log('localStorage error: ' + e.message, 'error');
        }
        
        log('Debug complete. Please share this output with the developer.', 'info');
    </script>
</body>
</html>
