<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-scheme="vampire">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>费曼 - AI 学习伙伴</title>
    <style>
      /* Prevent flash of unstyled content */
      html, body, #root {
        background-color: #282a36;
        min-height: 100vh;
        margin: 0;
        padding: 0;
      }
      /* Loading indicator */
      .loading-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #282a36;
        color: #f8f8f2;
        font-family: system-ui, sans-serif;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 85, 85, 0.3);
        border-top-color: #ff5555;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 16px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
        <span>正在加载费曼学习助手...</span>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
