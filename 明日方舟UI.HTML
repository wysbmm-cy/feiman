<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目价值研判终端 - 逻辑拓扑</title>
    <!-- 使用 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #09090b;
            color: white;
            font-family: 'Oswald', 'Microsoft YaHei', sans-serif;
            user-select: none;
        }

        /* 背景特效 */
        .tactical-bg {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 50% 50%, rgba(30, 30, 35, 0.8) 0%, #000000 100%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            transition: all 0.5s ease;
        }

        .scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.1) 50%, rgba(0, 0, 0, 0.1));
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.5;
            z-index: 1;
        }

        /* 呼吸光晕动画（用于连接线） */
        @keyframes pulse-glow {

            0%,
            100% {
                filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.4));
                opacity: 0.6;
            }

            50% {
                filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
                opacity: 1;
            }
        }

        .line-glow {
            animation: pulse-glow 3s infinite alternate;
            transition: stroke 0.3s ease, opacity 0.3s ease;
        }

        /* 被虚化的线条 */
        .line-dimmed {
            opacity: 0.1 !important;
            filter: none !important;
            animation: none;
        }

        /* 节点状态 */
        .node-container {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .node-dimmed {
            filter: blur(4px) brightness(0.4);
            pointer-events: none;
        }

        .node-active {
            z-index: 50 !important;
            transform: translate(-50%, -50%) scale(1.15) !important;
        }

        /* 虚化遮罩层 */
        #blur-overlay {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, backdrop-filter 0.4s ease;
            backdrop-filter: blur(0px);
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.8) 70%, rgba(0, 0, 0, 0.95) 100%);
        }

        #blur-overlay.active {
            opacity: 1;
            pointer-events: auto;
            backdrop-filter: blur(6px);
        }

        /* 右侧详情面板动画 */
        #detail-panel {
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #detail-panel.active {
            transform: translateX(0);
        }

        /* 对角线切角框 */
        .clip-corner {
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        }

        .clip-corner-reverse {
            clip-path: polygon(15px 0, 100% 0, 100% 100%, 0 100%, 0 15px);
        }
    </style>
</head>

<body class="relative w-screen h-screen">

    <!-- 背景层 -->
    <div id="main-bg" class="tactical-bg"></div>
    <div class="scanlines"></div>
    <canvas id="particles" class="absolute inset-0 z-[2] opacity-40 pointer-events-none"></canvas>

    <!-- 顶栏 -->
    <div class="absolute top-6 left-6 z-40 flex h-12 bg-black/80 backdrop-blur border border-white/20">
        <div class="w-16 flex items-center justify-center border-r border-white/20 cursor-pointer hover:bg-white/10">
            <svg class="w-8 h-8 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="1.5" d="M15 19l-7-7 7-7"></path>
            </svg>
        </div>
        <div class="relative px-6 flex items-center justify-center overflow-hidden">
            <span class="text-sm tracking-widest font-bold">PROJECT EVALUATION SYS</span>
        </div>
    </div>

    <!-- 地图与节点 -->
    <div id="map-container" class="absolute inset-0 z-10">
        <svg id="lines-layer" class="absolute inset-0 w-full h-full z-0"></svg>
        <div id="nodes-layer" class="absolute inset-0 w-full h-full z-10"></div>
    </div>

    <!-- 虚化遮罩层（点击此处可关闭面板） -->
    <div id="blur-overlay" class="absolute inset-0 z-30" onclick="closePanel()"></div>

    <!-- ================== 右侧详情面板 (还原 BB-1 截图) ================== -->
    <div id="detail-panel"
        class="absolute right-0 top-0 bottom-0 w-[500px] z-40 flex flex-col pt-12 pb-8 pr-12 pl-8 text-white">

        <!-- 右上角精力值 -->
        <div class="absolute top-6 right-12 flex items-center gap-2 opacity-80">
            <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9v-2h2v2zm0-4H9V7h2v5z" />
            </svg>
            <span class="text-2xl font-bold font-['Oswald']" id="panel-energy">24/100</span>
        </div>

        <!-- 标题区域 -->
        <div class="mt-8 flex justify-end flex-col items-end">
            <div class="flex items-center gap-2 mb-1">
                <span class="text-[10px] bg-black px-1 border border-white/30 tracking-widest">PHASE</span>
                <span class="text-2xl font-bold tracking-wider" id="panel-id">STEP-01</span>
            </div>
            <div class="flex items-center gap-3">
                <h1 class="text-4xl font-bold tracking-widest text-right" id="panel-title">确认市场受众</h1>
                <!-- 装饰六边形 -->
                <div class="flex gap-0.5 text-[#00bfff]">
                    <svg class="w-8 h-8" viewBox="0 0 100 100" fill="currentColor">
                        <polygon points="50,4 96,26 96,74 50,96 4,74 4,26"></polygon>
                    </svg>
                    <svg class="w-8 h-8" viewBox="0 0 100 100" fill="currentColor">
                        <polygon points="50,4 96,26 96,74 50,96 4,74 4,26"></polygon>
                    </svg>
                </div>
            </div>
        </div>

        <div class="w-full h-px bg-white/20 my-6"></div>

        <!-- 核心内容区 -->
        <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar flex flex-col gap-6">

            <!-- 优先级与短描述 (还原红底条) -->
            <div class="relative pl-24">
                <div
                    class="absolute left-0 top-0 w-20 h-20 rounded-full border border-white/30 flex items-center justify-center opacity-50">
                    <svg class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </div>
                <div class="bg-[#d93a36] text-white text-sm font-bold px-3 py-1 inline-block clip-corner-reverse shadow-md"
                    id="panel-priority">
                    推荐优先级 高
                </div>
                <div class="text-gray-400 text-sm mt-2 italic border-l-2 border-gray-600 pl-3" id="panel-flavor">
                    "这是所有项目的起点，伪需求是一切灾难的根源。"
                </div>
                <p class="text-sm text-gray-200 mt-4 leading-relaxed" id="panel-desc">
                    详细描述...
                </p>
            </div>

            <!-- 具体方法论 / 敌方情报(风险) 模块 -->
            <div class="mt-4 flex gap-4">
                <div
                    class="flex-1 bg-white/5 border border-white/10 p-3 hover:bg-white/10 transition cursor-pointer group">
                    <div class="text-xs text-gray-400 mb-1">执行方案 / METHODS</div>
                    <div class="text-sm group-hover:text-[#00bfff] transition" id="panel-methods">
                        1. 问卷调查<br>2. 竞品用户群潜伏
                    </div>
                </div>
                <div
                    class="w-24 h-24 bg-black/50 border border-white/20 flex flex-col items-center justify-center hover:border-[#d93a36] transition cursor-pointer">
                    <span class="text-xs text-gray-400 mb-1">风险提示</span>
                    <svg class="w-8 h-8 text-[#d93a36]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>

        </div>

        <!-- 底部操作区 (还原报酬、演习、开始行动) -->
        <div class="mt-auto pt-6 border-t border-white/20 flex flex-col gap-4">
            <div class="flex justify-between items-end">
                <div class="flex flex-col gap-1">
                    <span class="text-xs text-gray-400">输出产物 (报酬)</span>
                    <div
                        class="w-14 h-14 rounded-full border-2 border-[#b5ce4e] bg-black/40 flex items-center justify-center">
                        <svg class="w-8 h-8 text-[#b5ce4e]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                    </div>
                </div>

                <div
                    class="flex items-center gap-2 text-sm text-gray-300 border border-gray-600 px-3 py-1 cursor-pointer hover:bg-white/10">
                    <div class="w-3 h-3 border border-gray-400"></div>
                    自动化辅助
                </div>
            </div>

            <!-- 按钮组 -->
            <div class="flex h-16 shadow-lg shadow-black/50">
                <button
                    class="w-32 bg-white text-black font-bold text-lg hover:bg-gray-200 transition clip-corner-reverse flex items-center justify-center border-r border-gray-300"
                    onclick="closePanel()">
                    收起
                </button>
                <button
                    class="flex-1 bg-[#0098dc] text-white font-bold text-xl hover:bg-[#00bfff] transition clip-corner flex items-center justify-between px-6"
                    onclick="alert('进入执行页面...')">
                    <span>开始执行</span>
                    <span class="text-xs opacity-80 flex items-center gap-1"><svg class="w-3 h-3" viewBox="0 0 24 24"
                            fill="currentColor">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9v-2h2v2zm0-4H9V7h2v5z" />
                        </svg> -10</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // === 笔记逻辑节点数据 ===
        const nodesData = [
            {
                id: 'N-01', label: '市场受众', type: 'CORE', iconType: 'hex', x: 15, y: 50,
                detail: {
                    title: '确认市场受众',
                    energy: '10/100',
                    priority: '推荐优先级 极高',
                    flavor: '"这是所有项目的起点，伪需求是一切灾难的根源。"',
                    desc: '在投入开发前，必须确认该痛点是否真实存在，且受众群体足够大。很多时候我们认为的需求，仅仅是“开发者自身的痒点”。',
                    methods: '1. 关键词搜索量分析 (SEO/百度指数)<br>2. 社交媒体舆情与竞品评论区观察<br>3. 目标用户深度访谈 (至少5人)'
                }
            },
            {
                id: 'N-02', label: '受众画像', type: 'SUB', iconType: 'circle', x: 30, y: 25,
                detail: {
                    title: '刻画受众画像',
                    energy: '15/100',
                    priority: '优先级 中',
                    flavor: '"不仅要找到他们，还要了解他们的喜怒哀乐。"',
                    desc: '明确你的核心用户是谁。他们的年龄、职业、付费能力、核心痛点场景是什么？',
                    methods: '建立 User Persona，列出: <br>- 人口统计学特征<br>- 痛点与阻力<br>- 期望的收益'
                }
            },
            {
                id: 'N-03', label: '竞品分析', type: 'CORE', iconType: 'hex', x: 32, y: 70,
                detail: {
                    title: '竞品拆解与分析',
                    energy: '20/100',
                    priority: '优先级 高',
                    flavor: '"如果市场上没有竞品，大概率说明这是一条死路。"',
                    desc: '寻找解决同类痛点的现有产品，分析他们的优势、劣势以及未满足的市场缝隙。',
                    methods: '1. 罗列 Top3 竞品<br>2. 核心功能对比矩阵<br>3. 寻找差异化切入点 (更好用/更便宜/更垂直)'
                }
            },
            {
                id: 'N-04', label: '商业模式', type: 'CORE', iconType: 'hex', x: 50, y: 50,
                detail: {
                    title: '构思商业模式',
                    energy: '25/100',
                    priority: '优先级 极高',
                    flavor: '"用爱发电的项目注定短命，合理的循环才是生命力。"',
                    desc: '探讨项目如何赚钱或如何维持自身运转。是买断制、订阅制、还是依靠流量变现？',
                    methods: '使用精益画布(Lean Canvas)：<br>明确成本结构与收入来源，计算预期的 LTV(客户终身价值) 与 CAC(获客成本)。'
                }
            },
            {
                id: 'N-05', label: '成本核算', type: 'SUB', iconType: 'circle', x: 68, y: 25,
                detail: {
                    title: '研发与运营成本',
                    energy: '30/100',
                    priority: '优先级 高',
                    flavor: '"不要在开始前就花光所有的筹码。"',
                    desc: '计算将产品推向市场所需的最低时间成本和资金成本。',
                    methods: '列出：<br>1. 开发人力/时间成本<br>2. 服务器等硬件成本<br>3. 初期冷启动营销预算'
                }
            },
            {
                id: 'N-06', label: '构建 MVP', type: 'CORE', iconType: 'book', x: 72, y: 75,
                detail: {
                    title: '最小可行性产品',
                    energy: '50/100',
                    priority: '优先级 极高',
                    flavor: '"完美是完成的敌人，先让它跑起来。"',
                    desc: '剥离所有非核心功能，用最快的时间、最粗糙的方式实现核心业务闭环，投入市场测试。',
                    methods: '1. 砍需求：只保留解决核心痛点的 1 个功能<br>2. 无代码/低代码工具快速搭建<br>3. 甚至可以使用“绿野仙踪”法则手动服务'
                }
            },
            {
                id: 'N-07', label: '立项决策', type: 'CORE', iconType: 'hex', x: 88, y: 50,
                detail: {
                    title: '最终立项决策 (GO/NO GO)',
                    energy: '100/100',
                    priority: '判定点 关键',
                    flavor: '"准备好迎接暴风雨了吗？"',
                    desc: '综合上述所有数据反馈，进行最终的拍板。如果数据不佳，果断放弃（Pivot）是最好的选择。',
                    methods: '核对清单：<br>✅ 需求被验证<br>✅ 竞品有缝隙<br>✅ 成本可承受<br>✅ 变现逻辑清晰'
                }
            }
        ];

        // 定义连线
        const connections = [
            ['N-01', 'N-02'],
            ['N-01', 'N-03'],
            ['N-02', 'N-04'],
            ['N-03', 'N-04'],
            ['N-04', 'N-05'],
            ['N-04', 'N-06'],
            ['N-05', 'N-07'],
            ['N-06', 'N-07']
        ];

        // 图标 SVG 模板
        const icons = {
            hex: `<svg class="w-[42px] h-[42px] text-[#00bfff] drop-shadow-[0_0_8px_rgba(0,191,255,0.7)]" viewBox="0 0 100 100" fill="currentColor"><polygon points="50,4 96,26 96,74 50,96 4,74 4,26"></polygon></svg>`,
            circle: `<svg class="w-[38px] h-[38px] text-zinc-400 drop-shadow-[0_0_5px_rgba(255,255,255,0.2)]" viewBox="0 0 100 100" fill="currentColor"><circle cx="50" cy="50" r="48"></circle><polygon points="40,30 70,50 40,70" fill="#111"></polygon></svg>`,
            book: `<svg class="w-[42px] h-[42px] text-[#00bfff] drop-shadow-[0_0_8px_rgba(0,191,255,0.7)]" viewBox="0 0 100 100"><polygon points="50,4 96,26 96,74 50,96 4,74 4,26" fill="currentColor"></polygon><path d="M30,35 L48,35 L48,70 L30,65 Z" fill="white"/><path d="M70,35 L52,35 L52,70 L70,65 Z" fill="white"/></svg>`
        };

        const nodesLayer = document.getElementById('nodes-layer');
        const linesLayer = document.getElementById('lines-layer');
        let currentActiveNode = null;

        // 渲染节点
        function renderNodes() {
            nodesLayer.innerHTML = '';
            nodesData.forEach((node, index) => {
                const el = document.createElement('div');
                el.id = node.id;
                el.className = `node-container absolute flex items-center transform -translate-x-1/2 -translate-y-1/2 cursor-pointer group`;
                el.style.left = `${node.x}%`;
                el.style.top = `${node.y}%`;

                el.innerHTML = `
                    <div class="relative z-20 flex-shrink-0 transition-transform duration-300 group-hover:scale-110 -mr-3">
                        ${icons[node.iconType]}
                    </div>
                    <div class="relative bg-white pl-[22px] pr-5 py-1 min-w-[120px] shadow-[4px_4px_0_rgba(0,0,0,0.5)] transition-all duration-300 group-hover:bg-zinc-200">
                        <div class="absolute -top-[14px] left-[18px] bg-[#111] text-white text-[10px] font-bold px-1.5 py-[1px] tracking-widest uppercase z-30 flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-white inline-block"></span> ${node.type}
                        </div>
                        <div class="text-[#111] font-bold text-[24px] leading-none tracking-wider mt-1 whitespace-nowrap">
                            ${node.label}
                        </div>
                    </div>
                `;

                // 点击事件：打开侧边栏
                el.onclick = (e) => {
                    e.stopPropagation();
                    openPanel(node);
                };

                nodesLayer.appendChild(el);
            });
        }

        // 绘制连线
        function drawLines() {
            linesLayer.innerHTML = '';
            const containerRect = document.getElementById('map-container').getBoundingClientRect();

            connections.forEach((conn, idx) => {
                const startNode = document.getElementById(conn[0]);
                const endNode = document.getElementById(conn[1]);

                if (startNode && endNode) {
                    const rect1 = startNode.getBoundingClientRect();
                    const rect2 = endNode.getBoundingClientRect();

                    const x1 = rect1.left + rect1.width / 2 - containerRect.left;
                    const y1 = rect1.top + rect1.height / 2 - containerRect.top;
                    const x2 = rect2.left + rect2.width / 2 - containerRect.left;
                    const y2 = rect2.top + rect2.height / 2 - containerRect.top;

                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", x1);
                    line.setAttribute("y1", y1);
                    line.setAttribute("x2", x2);
                    line.setAttribute("y2", y2);
                    line.setAttribute("stroke", "white");
                    line.setAttribute("stroke-width", "3");
                    line.setAttribute("id", `line-${conn[0]}-${conn[1]}`);
                    line.setAttribute("class", "line-glow transition-all duration-300");

                    linesLayer.appendChild(line);
                }
            });
        }

        // 交互：打开面板与背景虚化
        function openPanel(node) {
            currentActiveNode = node.id;

            // 1. 填充面板数据
            document.getElementById('panel-id').innerText = node.id.replace('N-', 'STEP-');
            document.getElementById('panel-title').innerText = node.detail.title;
            document.getElementById('panel-energy').innerText = node.detail.energy;
            document.getElementById('panel-priority').innerText = node.detail.priority;
            document.getElementById('panel-flavor').innerText = node.detail.flavor;
            document.getElementById('panel-desc').innerText = node.detail.desc;
            document.getElementById('panel-methods').innerHTML = node.detail.methods;

            // 2. 状态切换：激活遮罩和面板
            document.getElementById('blur-overlay').classList.add('active');
            document.getElementById('detail-panel').classList.add('active');

            // 3. 地图节点与线条的视觉反馈 (暗化未选中的，高亮选中的)
            document.querySelectorAll('.node-container').forEach(el => {
                if (el.id === node.id) {
                    el.classList.add('node-active');
                    el.classList.remove('node-dimmed');
                } else {
                    el.classList.add('node-dimmed');
                    el.classList.remove('node-active');
                }
            });

            const lines = document.querySelectorAll('line');
            lines.forEach(line => {
                if (line.id.includes(node.id)) {
                    line.classList.remove('line-dimmed');
                } else {
                    line.classList.add('line-dimmed');
                }
            });
        }

        // 交互：关闭面板恢复原状
        function closePanel() {
            currentActiveNode = null;
            document.getElementById('blur-overlay').classList.remove('active');
            document.getElementById('detail-panel').classList.remove('active');

            document.querySelectorAll('.node-container').forEach(el => {
                el.classList.remove('node-dimmed', 'node-active');
            });
            document.querySelectorAll('line').forEach(line => {
                line.classList.remove('line-dimmed');
            });
        }

        // 初始化背景粒子
        function initParticles() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let width = canvas.width = window.innerWidth;
            let height = canvas.height = window.innerHeight;

            const particles = [];
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    size: Math.random() * 1.5 + 0.5,
                    speedX: (Math.random() - 0.5) * 0.5, speedY: (Math.random() - 0.5) * 0.5,
                    opacity: Math.random() * 0.5 + 0.1
                });
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    p.x += p.speedX; p.y += p.speedY;
                    if (p.x < 0 || p.x > width) p.speedX *= -1;
                    if (p.y < 0 || p.y > height) p.speedY *= -1;
                });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; drawLines(); });
            animate();
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderNodes();
            setTimeout(drawLines, 100);
            initParticles();
        });
    </script>
</body>

</html>
